<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="#030306" stroke="rgba(255,255,255,0.06)" stroke-width="12" />
  
  <!-- Solid object half (Top-Left) -->
  <path d="M 110,110 L 402,110 L 110,402 Z" fill="#ffffff" />
  
  <!-- Cutout outline half (Bottom-Right) -->
  <path d="M 402,402 L 402,180 L 180,402 Z" fill="none" stroke="#a3e635" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- High-contrast Neon Slider line -->
  <line x1="70" y1="442" x2="442" y2="70" stroke="#a3e635" stroke-width="32" stroke-linecap="round" filter="url(#glow)" />
</svg>